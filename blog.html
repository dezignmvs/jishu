<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Jishad Musthafa</title>
  <link rel="icon" type="image/png" href="faviocn.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FFC20D">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@200,300,400,500,600,700&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Clash Grotesk"', 'ClashGrostrek', 'Inter', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
          },
          colors: {
            brandYellow: '#FFC20D',
            btnText: '#FFECA1',
          },
        }
      }
    }
  </script>
</head>
<body class="bg-[#FAF9F5] text-black font-sans antialiased overflow-x-hidden leading-[1.4]">

  <!-- Navigation Header -->
  <header
    class="h-[80px] w-full sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-black/3 flex items-center max-md:h-[70px] max-sm:h-[65px]">
    <div class="w-full max-w-[1440px] mx-auto px-[50px] flex justify-between items-center max-sm:px-[24px]">
      <a href="index.html" class="flex items-center" aria-label="Jishad Musthafa Home">
        <img src="img/logo.png" alt="Logo" class="h-[29px] w-auto block">
      </a>
      <a href="index.html" class="inline-flex items-center justify-center font-medium text-[16px] bg-black text-white px-[20px] h-[40px] rounded-[8px] transition-all duration-200 hover:bg-neutral-800">
        Back Home
      </a>
    </div>
  </header>

  <main class="py-[80px]">
    <div class="max-w-[1200px] mx-auto px-[50px] max-sm:px-[24px]">
      <div class="mb-[60px] text-center">
        <span class="block text-[14px] text-[#7C7C7C] font-semibold mb-[12px] uppercase tracking-[0.15em]">Insights & Reflections</span>
        <h1 class="text-[56px] text-black font-semibold tracking-tight leading-[1.1] max-sm:text-[40px] font-sans">
          The Blog
        </h1>
        <p class="text-[18px] text-[#7C7C7C] mt-[16px] max-w-[600px] mx-auto font-light">
          Explore the latest thoughts, articles, and insights on leadership, professional growth, and personal empowerment.
        </p>
      </div>

      <!-- Blog Grid Container -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-[28px]" id="blogContainerFull">
        <!-- Loading state -->
        <div class="text-[#7C7C7C] text-center col-span-full">Loading all blogs...</div>
      </div>
    </div>
  </main>

  <!-- Blog Modal -->
  <div id="blogModal" class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-[20px]">
    <div id="blogModalContent" class="bg-white w-full max-w-[800px] max-h-[90vh] rounded-[16px] shadow-2xl overflow-hidden flex flex-col transform scale-95 transition-transform duration-300">
      <div class="relative h-[280px] md:h-[400px] max-h-[50vh] w-full shrink-0 bg-black flex items-center justify-center overflow-hidden">
        <img id="modalImage" src="" alt="Blog Cover" class="w-full h-full object-contain">
        <video id="blogModalVideo" src="" controls class="w-full h-full object-contain hidden"></video>
        <button id="closeModalBtn" class="absolute top-[16px] right-[16px] w-[40px] h-[40px] bg-black/50 hover:bg-black text-white rounded-full flex items-center justify-center transition-colors backdrop-blur-sm z-10">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-[30px] md:p-[40px] overflow-y-auto bg-[#FAF9F5]">
        <div class="mb-[16px]">
          <span id="modalDate" class="text-[14px] text-[#e67e22] font-semibold tracking-wider uppercase font-sans"></span>
        </div>
        <h2 id="modalTitle" class="text-[32px] md:text-[40px] font-semibold text-black leading-[1.1] mb-[24px] font-sans"></h2>
        <div id="modalTextContent" class="text-[16px] md:text-[18px] text-[#4a4a4a] leading-[1.7] whitespace-pre-wrap font-sans"></div>
        <div id="modalLinkContainer" class="mt-[32px] hidden">
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAQPeQLh2IQbI7ooVdgqEDS-vW585xfjyk",
      authDomain: "console-92a8b.firebaseapp.com",
      projectId: "console-92a8b",
      storageBucket: "console-92a8b.firebasestorage.app",
      messagingSenderId: "100288837026",
      appId: "1:100288837026:web:bdbca55cd6d6c047b7aefb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function isVideoUrl(url, mediaType) {
      if (mediaType === 'video') return true;
      if (!url) return false;
      return url.match(/\.(mp4|webm|ogg|mov)(\?.*)?$/i) || url.includes('/video/upload/');
    }

    const initFullBlog = () => {
      const blogContainer = document.getElementById('blogContainerFull');
      if (!blogContainer) return;
      
      const blogQuery = query(collection(db, "blogData"), orderBy("timestamp", "desc"));
      onSnapshot(blogQuery, (snapshot) => {
        blogContainer.innerHTML = "";
        
        let blogs = [];
        snapshot.forEach(doc => {
          const blogData = doc.data();
          if (blogData.status !== 'Draft') {
            blogs.push(blogData);
          }
        });

        if (blogs.length === 0) {
          blogContainer.innerHTML = `<div class="text-[#7C7C7C] col-span-full text-center">No blogs published yet. Check back soon!</div>`;
          return;
        }

        blogs.forEach(blog => {
          let displayDate = blog.date;
          try {
            if (blog.date) {
              const d = new Date(blog.date);
              displayDate = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            }
          } catch (e) {}

          const isVid = isVideoUrl(blog.image, blog.mediaType);

          const card = document.createElement("div");
          card.className = "flex flex-col bg-white border border-[#e0e0e0] rounded-[16px] overflow-hidden hover:shadow-[0_8px_24px_rgba(0,0,0,0.06)] transition-shadow duration-300 cursor-pointer";
          card.innerHTML = `
            <div class="aspect-[1.6] w-full overflow-hidden border-b border-black/5 relative bg-black">
              ${isVid 
                ? `<video src="${blog.image}" class="w-full h-full object-cover" muted loop playsinline autoplay></video>`
                : `<img src="${blog.image || 'img/training.jpg'}" alt="${escapeHtml(blog.title)}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">`}
              <div class="absolute top-[12px] right-[12px] bg-white/90 backdrop-blur-sm text-[12px] font-semibold px-[10px] py-[4px] rounded-full text-black shadow-sm">
                ${escapeHtml(blog.status || 'Published')}
              </div>
            </div>
            <div class="p-[24px] flex flex-col flex-1">
              <h3 class="text-[22px] font-medium text-black leading-[1.25] mb-[12px] font-sans">${escapeHtml(blog.title)}</h3>
              <div class="mt-auto pt-[16px] border-t border-black/5 flex items-center justify-between">
                <div class="text-[14px] text-[#e67e22] font-medium font-sans">
                  Published &bull; <span class="text-[#7f8c8d] font-normal">${escapeHtml(displayDate)}</span>
                </div>
              </div>
            </div>
          `;
          
          card.addEventListener('click', () => {
            openModal(blog, displayDate);
          });
          
          blogContainer.appendChild(card);
        });
      });
      
      const blogModal = document.getElementById('blogModal');
      const blogModalContent = document.getElementById('blogModalContent');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const modalImage = document.getElementById('modalImage');
      const blogModalVideo = document.getElementById('blogModalVideo');
      const modalTitle = document.getElementById('modalTitle');
      const modalDate = document.getElementById('modalDate');
      const modalTextContent = document.getElementById('modalTextContent');
      const modalLinkContainer = document.getElementById('modalLinkContainer');

      function openModal(blog, displayDate) {
        const isVid = isVideoUrl(blog.image, blog.mediaType);
        if (isVid && blogModalVideo) {
          modalImage.style.display = 'none';
          blogModalVideo.src = blog.image;
          blogModalVideo.classList.remove('hidden');
        } else {
          if (blogModalVideo) {
            blogModalVideo.pause();
            blogModalVideo.src = '';
            blogModalVideo.classList.add('hidden');
          }
          modalImage.style.display = 'block';
          modalImage.src = blog.image || 'img/training.jpg';
        }

        modalTitle.textContent = blog.title || '';
        modalDate.textContent = 'Published • ' + (displayDate || '');
        modalTextContent.textContent = blog.content || 'No content provided.';
        
        let linksToDisplay = [];
        if (Array.isArray(blog.links) && blog.links.length > 0) {
          linksToDisplay = blog.links;
        } else if (blog.link) {
          linksToDisplay = [{ url: blog.link, text: 'Link' }];
        }

        if (linksToDisplay.length > 0) {
          modalLinkContainer.innerHTML = linksToDisplay.map(l => `
            <a href="${escapeHtml(l.url)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center gap-[8px] bg-black text-btnText font-medium text-[15px] px-[22px] h-[46px] rounded-[12px] border border-black hover:bg-brandYellow hover:text-black hover:-translate-y-[2px] transition-all duration-200 ease-smooth">
              ${escapeHtml(l.text || 'Link')}
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            </a>
          `).join('');
          modalLinkContainer.className = "mt-[32px] flex flex-wrap gap-[12px]";
        } else {
          modalLinkContainer.className = "mt-[32px] hidden";
          modalLinkContainer.innerHTML = "";
        }

        blogModal.classList.remove('hidden');
        void blogModal.offsetWidth;
        blogModal.classList.remove('opacity-0');
        blogModal.classList.add('opacity-100');
        blogModalContent.classList.remove('scale-95');
        blogModalContent.classList.add('scale-100');
        document.body.style.overflow = 'hidden';
      }

      function closeModal() {
        if (blogModalVideo) blogModalVideo.pause();
        blogModal.classList.remove('opacity-100');
        blogModal.classList.add('opacity-0');
        blogModalContent.classList.remove('scale-100');
        blogModalContent.classList.add('scale-95');
        setTimeout(() => {
          blogModal.classList.add('hidden');
          if (blogModalVideo) blogModalVideo.src = '';
          document.body.style.overflow = '';
        }, 300);
      }

      closeModalBtn.addEventListener('click', closeModal);
      blogModal.addEventListener('click', (e) => {
        if (e.target === blogModal) closeModal();
      });

      function escapeHtml(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    };

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initFullBlog);
    } else {
      initFullBlog();
    }
  </script>
</body>
</html>
